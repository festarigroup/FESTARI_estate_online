<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#FFF7F2"/>
      <stop offset="1" stop-color="#FFFFFF"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#BE4D00"/>
      <stop offset="1" stop-color="#F59E0B"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#111827" flood-opacity="0.18"/>
    </filter>
    <pattern id="dots" width="18" height="18" patternUnits="userSpaceOnUse">
      <circle cx="2" cy="2" r="1.5" fill="#9CA3AF" opacity="0.22"/>
    </pattern>
  </defs>

  <rect width="1200" height="900" rx="28" fill="url(#bg)"/>
  <rect x="48" y="48" width="1104" height="804" rx="24" fill="url(#dots)" opacity="0.55"/>

  <!-- Card -->
  <g filter="url(#shadow)">
    <rect x="180" y="150" width="840" height="600" rx="26" fill="#FFFFFF"/>
    <rect x="180" y="150" width="840" height="10" rx="5" fill="url(#accent)"/>

    <!-- Building silhouette -->
    <rect x="260" y="250" width="380" height="340" rx="18" fill="#F3F4F6"/>
    <rect x="660" y="310" width="280" height="280" rx="18" fill="#E5E7EB"/>
    <rect x="310" y="300" width="130" height="95" rx="12" fill="#FFFFFF"/>
    <rect x="470" y="300" width="130" height="95" rx="12" fill="#FFFFFF"/>
    <rect x="310" y="420" width="130" height="120" rx="12" fill="#FFFFFF"/>
    <rect x="470" y="420" width="130" height="120" rx="12" fill="#FFFFFF"/>
    <rect x="700" y="350" width="190" height="80" rx="12" fill="#FFFFFF"/>
    <rect x="700" y="455" width="190" height="135" rx="12" fill="#FFFFFF"/>

    <!-- Steps -->
    <rect x="250" y="610" width="720" height="28" rx="12" fill="#F3F4F6"/>
    <rect x="280" y="650" width="660" height="28" rx="12" fill="#E5E7EB"/>
    <rect x="310" y="690" width="600" height="28" rx="12" fill="#D1D5DB"/>

    <!-- Tag -->
    <rect x="260" y="200" width="210" height="34" rx="17" fill="#111827" opacity="0.06"/>
    <path d="M282 218c0-5.5 4.5-10 10-10h58c5.5 0 10 4.5 10 10s-4.5 10-10 10h-58c-5.5 0-10-4.5-10-10Z" fill="#111827" opacity="0.10"/>
    <path d="M366 218c0-5.5 4.5-10 10-10h68c5.5 0 10 4.5 10 10s-4.5 10-10 10h-68c-5.5 0-10-4.5-10-10Z" fill="#111827" opacity="0.06"/>
  </g>

  <!-- Corner accents -->
  <path d="M104 170c20-38 52-70 90-90" stroke="#BE4D00" stroke-width="6" stroke-linecap="round" opacity="0.35"/>
  <path d="M1096 730c-20 38-52 70-90 90" stroke="#BE4D00" stroke-width="6" stroke-linecap="round" opacity="0.25"/>
</svg>

