services:
  server:
    build:
      context: ./server
      dockerfile: festari_backend/Dockerfile
    container_name: django_api
    volumes:
      - ./server:/app
    ports:
      - "8000:8000"
    env_file:
      - ./server/festari_backend/.env
    depends_on:
      - db
      - redis

  worker:
    build:
      context: ./server
      dockerfile: festari_backend/Dockerfile
    container_name: django_worker
    volumes:
      - ./server:/app
    env_file:
      - ./server/festari_backend/.env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "festari_backend", "worker", "--loglevel=info", "--concurrency=1"]

  beat:
    build:
      context: ./server
      dockerfile: festari_backend/Dockerfile
    container_name: django_beat
    volumes:
      - ./server:/app
    env_file:
      - ./server/festari_backend/.env
    depends_on:
      - db
      - redis
    command: ["celery", "-A", "festari_backend", "beat", "--loglevel=info"]

  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: nextjs_app
    volumes:
      - ./client:/app
      - /app/node_modules
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:8000
    depends_on:
      - server

  db:
    image: postgres
    container_name: postgres_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=festari_db
      - PGDATA=/var/lib/postgresql/data
    ports:
      - "5432:5432"

  redis:
    image: redis
    container_name: redis_cache
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"

volumes:
  postgres_data:
  redis_data: