<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Festari Password Reset</title>
  </head>
  <body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%">
      <tr>
        <td align="center" style="padding-bottom: 20px;">
          <img src="{{ logo_url }}" height="70" alt="Festari Estate Logo" />
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 20px;">
          <h1 style="margin:0;">Reset Your Password</h1>
        </td>
      </tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center">
          <table cellpadding="0" cellspacing="0" border="0" width="600" style="background-color: #fff; padding: 20px; border-radius: 10px;">
            <tr>
              <td>
                <p>Hi {{ user.first_name|default:user.username }},</p>
                <p>We received a request to reset your password. To continue, click the button below:</p>
                <p style="text-align:center;">
                  <a href="{{ reset_link }}" style="padding: 12px 20px; background-color: #0033cc; color: #fff; text-decoration: none; border-radius: 6px;">Reset Password</a>
                </p>
                <p>If you did not request this password reset, please ignore this email.</p>
                <p>Thanks,<br/>Festari Estates Team</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
