<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Festari Payment Notification</title>
  </head>
  <body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">
    <table cellpadding="0" cellspacing="0" border="0" width="100%">
      <tr>
        <td align="center" style="padding-bottom: 20px;">
          <img src="{{ logo_url }}" height="70" alt="Festari Estate Logo" />
        </td>
      </tr>
      <tr>
        <td align="center" style="padding-bottom: 20px;">
          <h1 style="margin:0;">Payment {{ status|title }}</h1>
        </td>
      </tr>
    </table>

    <table width="100%" cellpadding="0" cellspacing="0" border="0">
      <tr>
        <td align="center">
          <table cellpadding="0" cellspacing="0" border="0" width="600" style="background-color: #fff; padding: 20px; border-radius: 10px;">
            <tr>
              <td>
                <p>Hi {{ recipient_name }},</p>
                <p>{{ message }}</p>
                <ul>
                  <li>Payment reference: {{ reference }}</li>
                  <li>Amount: {{ amount }} {{ currency }}</li>
                  <li>Type: {{ payment_type }}</li>
                  <li>Status: {{ status }}</li>
                </ul>
                <p>Thank you for using Festari Estates.</p>
                <p>Regards,<br/>Festari Estates Team</p>
              </td>
            </tr>
          </table>
        </td>
      </tr>
    </table>
  </body>
</html>
