<body style="font-family: Arial, sans-serif; background-color: #f5f5f5; padding: 20px;">
  <table cellpadding="0" cellspacing="0" border="0" width="100%">
    <tr>
      <td align="center" style="padding-bottom: 20px;">
        <img src="../../static/images/FestariEstatesLogo.png" height="70" alt="Festari Estate Logo"/>
      </td>
    </tr>
    <tr>
      <td align="center" style="padding-bottom: 20px;">
        <img src="../../static/images/FestariEstatesText.png" width="250" alt="Festari Estate Text"/>
      </td>
    </tr>
  </table>

  <table width="100%" cellpadding="0" cellspacing="0" border="0">
    <tr>
      <td align="center">
        <table cellpadding="0" cellspacing="0" border="0" width="600"
          style="background-color: #ffffff; padding: 30px; border-radius: 10px;">

          <tr>
            <td align="center" style="padding-bottom: 20px;">
              <h1 style="font-size: 20px; font-weight: normal; color: #161616; margin: 0;">
                Password Reset Request
              </h1>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 20px;">
              <p style="font-size: 14px; color: #161616; margin: 0;">
                We received a request to reset your password.
              </p>
              <p style="font-size: 14px; color: #161616;">
                Click the button below to reset your password.
              </p>
            </td>
          </tr>

          <tr>
            <td align="center" style="padding-bottom: 30px;">
              <a href="{{ reset_link }}"
                 style="background-color: #161616;
                        color: #ffffff;
                        padding: 12px 24px;
                        text-decoration: none;
                        border-radius: 5px;
                        font-size: 14px;
                        display: inline-block;">
                Reset Password
              </a>
            </td>
          </tr>

          <tr>
            <td align="center">
              <p style="font-size: 12px; color: #888888; margin: 0;">
                This link will expire shortly. If you did not request this, please ignore this email.
              </p>
            </td>
          </tr>

        </table>
      </td>
    </tr>
  </table>
</body>
